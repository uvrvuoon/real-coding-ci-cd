name: Java CI with Gradle and OracleDB

on:
  push:
    branches: [ "main", "master" ] # 본인의 메인 브랜치 이름에 맞게 수정
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 레포지토리 코드 가져오기
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Java 17 환경 설정
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Gradle 캐싱 (빌드 속도 향상)
    - name: Gradle cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # 4. Gradle 실행 권한 부여
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 5. 빌드 및 테스트 실행
    # (주의: 만약 테스트 단계에서 실제 Oracle DB 연결이 필수적이라면 아래 주석 가이드를 참고하세요)
    - name: Build and Test with Gradle
      run: ./gradlew build
