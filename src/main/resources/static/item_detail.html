<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>중고마켓 - 물품 상세</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f5f6f7; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .detail-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 800px; margin: 0 auto; display: flex; gap: 30px; flex-wrap: wrap; }

        /* 이미지 갤러리 영역 */
        .image-gallery { flex: 1; min-width: 300px; }
        .main-img { width: 100%; height: 300px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; }
        .thumb-list { display: flex; gap: 10px; }
        .thumb-list img { width: 80px; height: 80px; object-fit: cover; border-radius: 4px; cursor: pointer; border: 1px solid #ddd; }

        /* 정보 영역 */
        .info-area { flex: 1; min-width: 300px; }
        .status-badge { display: inline-block; padding: 5px 10px; font-size: 12px; font-weight: bold; border-radius: 12px; color: white; margin-bottom: 10px; background-color: #ff6f0f; }
        .price { font-size: 24px; font-weight: bold; color: #000; margin: 10px 0; }
        .meta-info { color: #666; font-size: 14px; margin-bottom: 20px; line-height: 1.6; }

        /* 구매 요청 폼 영역 */
        .request-box { background: #f9f9f9; padding: 20px; border-radius: 8px; margin-top: 20px; border: 1px solid #eee; }
        .request-box input, .request-box textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-bottom: 10px; }
        .btn-req { background-color: #ff6f0f; color: white; }
        .btn-chat { background-color: #333; color: white; }
    </style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
    <h2 style="margin: 0; color: #ff6f0f; cursor: pointer;" onclick="location.href='/items.html'">🥕 중고마켓</h2>
    <button class="btn" style="width: auto; background-color: #888; color: white;" onclick="history.back()">목록으로</button>
</div>

<!-- 상세 정보 컨테이너 -->
<div class="detail-container" id="detailContent">
    <!-- 자바스크립트로 데이터가 채워집니다. -->
    <h3 style="width: 100%; text-align: center;">데이터를 불러오는 중입니다...</h3>
</div>

<script>
    // URL에서 판매자 cno와 itemNo 추출 (items.html에서 전달된 값)
    const urlParams = new URLSearchParams(window.location.search);
    const sellerCno = urlParams.get('cno');
    const itemNo = urlParams.get('itemNo');

    let currentItem = null;

    window.onload = fetchItemDetail;

    async function fetchItemDetail() {
        try {
            const response = await fetch(`/api/items/detail?cno=${sellerCno}&itemNo=${itemNo}`);
            if (response.ok) {
                currentItem = await response.json();
                renderDetail(currentItem);
            } else {
                alert("물품 정보를 불러올 수 없습니다.");
                location.href = '/items.html';
            }
        } catch (error) {
            console.error("상세 정보 로드 오류:", error);
        }
    }

    function renderDetail(item) {
        const container = document.getElementById('detailContent');

        // 이미지 배열 구성 (최종 확정된 photo1, photo2, photo3 사용)
        const photos = [item.photo1, item.photo2, item.photo3].filter(p => p != null);
        const mainImgSrc = photos.length > 0 ? `/uploads/${photos[0]}` : 'https://via.placeholder.com/400x300?text=No+Image';

        let thumbsHtml = '';
        photos.forEach(photo => {
            thumbsHtml += `<img src="/uploads/${photo}" onclick="document.getElementById('mainImage').src='/uploads/${photo}'">`;
        });

        // 상태 배지 색상
        let statusColor = '#ff6f0f'; // 판매 중
        if (item.sellStatus === '예약 중') statusColor = '#28a745';
        if (item.sellStatus === '거래 완료') statusColor = '#6c757d';

        container.innerHTML = `
                <div class="image-gallery">
                    <img id="mainImage" class="main-img" src="${mainImgSrc}" alt="상품 이미지">
                    <div class="thumb-list">${thumbsHtml}</div>
                </div>

                <div class="info-area">
                    <span class="status-badge" style="background-color: ${statusColor}">${item.sellStatus}</span>
                    <h2 style="margin: 0 0 10px 0;">${item.title}</h2>
                    <div class="price">${item.price.toLocaleString()}원</div>

                    <div class="meta-info">
                        <strong>판매자:</strong> ${item.cno} <br>
                        <strong>카테고리:</strong> ${item.category} <br>
                        <strong>거래 장소:</strong> ${item.tradePlace || '미지정'} <br>
                        <strong>등록일:</strong> ${new Date(item.regDateTime).toLocaleString()}
                    </div>

                    <div style="padding: 15px; background: #f1f1f1; border-radius: 4px; min-height: 100px; margin-bottom: 20px;">
                        ${item.description || '상세 설명이 없습니다.'}
                    </div>

                    <!-- 구매 요청 영역 (평가 기준 단계 4 반영) -->
                    <div class="request-box">
                        <h4 style="margin-top: 0;">💬 구매 요청하기</h4>
                        <input type="number" id="reqPrice" placeholder="희망 거래 가격 (예: ${item.price})" required>
                        <textarea id="reqMessage" rows="3" placeholder="판매자에게 보낼 메시지를 적어주세요. (예: 지금 바로 직거래 가능합니다!)" required></textarea>

                        <button class="btn btn-req" onclick="submitPurchaseRequest()">구매 요청 보내기</button>
                        <button class="btn btn-chat" onclick="location.href='/chat.html?sellerCno=${item.cno}&itemNo=${item.itemNo}'">1:1 채팅하기</button>
                    </div>
                </div>
            `;
    }

    // [단계 4] 구매 요청 백엔드 전송
    async function submitPurchaseRequest() {
        const reqPrice = document.getElementById('reqPrice').value;
        const reqMessage = document.getElementById('reqMessage').value;

        if (!reqPrice || !reqMessage) {
            alert("희망 가격과 메시지를 모두 입력해주세요.");
            return;
        }

        try {
            const response = await fetch('/api/requests/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    sellerCno: sellerCno,
                    itemNo: itemNo,
                    reqPrice: reqPrice,
                    reqMessage: reqMessage
                })
            });

            if (response.ok) {
                alert("구매 요청이 성공적으로 전송되었습니다!");
            } else {
                const errorMsg = await response.text();
                alert("요청 실패: " + errorMsg); // 예외 처리 (본인 물품 요청 불가 등)
            }
        } catch (error) {
            alert("서버 연결에 실패했습니다.");
        }
    }
</script>
</body>
</html>
