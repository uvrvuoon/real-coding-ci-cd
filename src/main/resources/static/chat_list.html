<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>중고마켓 - 내 채팅방 목록</title>
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; background-color: #f5f6f7; margin: 0; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .chat-list-container { background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 800px; margin: 0 auto; overflow: hidden; }
    .chat-item { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #eee; cursor: pointer; transition: background-color 0.2s; }
    .chat-item:hover { background-color: #f9f9f9; }
    .chat-item:last-child { border-bottom: none; }
    .chat-info { flex: 1; }
    .partner-id { font-weight: bold; font-size: 18px; margin-bottom: 5px; color: #333; }
    .last-message { color: #666; font-size: 14px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 550px; }
    .meta-text { font-size: 12px; color: #999; }

    /* 평가 기준: 안 읽은 메시지 수 배지 */
    .unread-badge { background-color: #ff6f0f; color: white; border-radius: 50%; padding: 4px 8px; font-size: 12px; font-weight: bold; min-width: 15px; text-align: center; }
    .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <h2 style="margin: 0; color: #ff6f0f; cursor: pointer;" onclick="location.href='/items.html'">🥕 중고마켓</h2>
  <button class="btn" style="background-color: #888; color: white;" onclick="location.href='/items.html'">목록으로</button>
</div>

<div style="max-width: 800px; margin: 0 auto 15px auto;">
  <h3 style="margin: 0;">💬 내 채팅방 목록</h3>
</div>

<!-- 채팅방 목록이 들어갈 컨테이너 -->
<div class="chat-list-container" id="chatListContent">
  <div style="padding: 20px; text-align: center; color: #666;">채팅방 목록을 불러오는 중입니다...</div>
</div>

<script>
  window.onload = fetchChatRooms;

  // 백엔드에서 채팅방 목록 및 안 읽은 메시지 수 가져오기
  async function fetchChatRooms() {
    try {
      const response = await fetch('/api/chat/list');
      if (response.status === 401) {
        alert("로그인이 필요합니다.");
        location.href = '/items.html';
        return;
      }

      if (response.ok) {
        const rooms = await response.json();
        renderChatList(rooms);
      } else {
        document.getElementById('chatListContent').innerHTML =
                '<div style="padding: 20px; text-align: center; color: red;">목록을 불러오는데 실패했습니다.</div>';
      }
    } catch (error) {
      console.error("채팅 목록 로드 오류:", error);
    }
  }

  // 화면에 채팅방 그리기
  function renderChatList(rooms) {
    const container = document.getElementById('chatListContent');
    container.innerHTML = ''; // "불러오는 중" 메시지 초기화

    if (rooms.length === 0) {
      container.innerHTML = '<div style="padding: 40px 20px; text-align: center; color: #666;">진행 중인 채팅이 없습니다.</div>';
      return;
    }

    rooms.forEach(room => {
      // 날짜 포맷 변환
      const dateObj = new Date(room.lastMessageTime);
      const formattedDate = dateObj.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

      // 안 읽은 메시지가 0보다 크면 주황색 배지 생성
      const badgeHtml = room.unreadCount > 0
              ? `<div class="unread-badge">${room.unreadCount}</div>`
              : '';

      // 클릭 시 1:1 대화방(chat.html)으로 이동 (방 번호와 상대방 CNO 전달)
      const roomHtml = `
                    <div class="chat-item" onclick="location.href='/chat.html?roomNo=${room.roomNo}&partnerCno=${room.partnerCno}'">
                        <div class="chat-info">
                            <div class="partner-id">👤 ${room.partnerCno} 님과의 대화</div>
                            <div class="last-message">${room.lastMessage}</div>
                            <div class="meta-text">물품 번호: ${room.itemNo} | 마지막 시간: ${formattedDate}</div>
                        </div>
                        ${badgeHtml}
                    </div>
                `;
      container.innerHTML += roomHtml;
    });
  }
</script>
</body>
</html>
